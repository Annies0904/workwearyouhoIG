version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ig_reply
      POSTGRES_USER: ig_user
      POSTGRES_PASSWORD: ig_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ig_user -d ig_reply']
      interval: 10s
      timeout: 5s
      retries: 5

  webhook:
    build:
      context: ./webhook
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./webhook/.env
    environment:
      DATABASE_URL: postgresql://ig_user:ig_pass@postgres:5432/ig_reply
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./admin/.env.local
    environment:
      DATABASE_URL: postgresql://ig_user:ig_pass@postgres:5432/ig_reply
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
